<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thala 7. | Shop Now</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="page">
    <!-- ===== Navbar ===== -->
    <header class="navbar">
      <div class="logo">Thala <span>7.</span></div>

      <nav class="nav-links">
        <a href="#" class="active">Home</a>
        <a href="#">About</a>
        <a href="#">Brands <span class="caret">&#9662;</span></a>
        <a href="#">More <span class="caret">&#9662;</span></a>
        <a href="#">Contact</a>
      </nav>

      <div class="nav-right">
        <div class="search-box">
          <span class="search-icon">&#128269;</span>
          <input type="text" placeholder="Search" />
        </div>
        <button class="bag-btn">
          <span class="bag-icon">&#128717;</span>
          <span class="bag-count">0</span>
        </button>
        <div class="avatar"></div>
      </div>
    </header>

    <!-- ===== Hero ===== -->
    <main class="hero">
      <div class="hero-left">
        <div class="brand-mark">se<span class="v">v</span>en</div>

        <h1 class="hero-title">
          7!! Thala For<br />
          a <span class="orange">Reason!</span>
        </h1>

        <p class="hero-text">
          Lorem ipsum dolor sit amet consectetur. Pretium quisque lorem
          feugiat justo at ut orci nisi.
        </p>

        <a href="product.html" class="shop-btn">Shop Now</a>
      </div>

      <div class="hero-right">
        <img
          src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=900&q=80"
          alt="Running shoe"
          class="shoe-img"
        />
      </div>
    </main>

    <!-- ===== Stats bar ===== -->
    <section class="stats">
      <div class="stat">
        <span class="stat-icon">&#128172;</span>
        <div class="stat-text">
          <strong>2k+</strong>
          <span>Reviews</span>
        </div>
      </div>

      <div class="stat">
        <span class="stat-icon">&#128101;</span>
        <div class="stat-text">
          <strong>30k+</strong>
          <span>Customers</span>
        </div>
      </div>

      <div class="stat">
        <span class="stat-icon">&#127942;</span>
        <div class="stat-text">
          <strong>High</strong>
          <span>Quality</span>
        </div>
      </div>

      <div class="stat">
        <span class="stat-icon">&#11088;</span>
        <div class="stat-text">
          <strong>4.5/5</strong>
          <span>Rating</span>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
